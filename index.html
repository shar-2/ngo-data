<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Ngo'Data</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <header>

        <h1>Ngo'Data</h1>

        <p>
            Report problems in your community easily.
        </p>

    </header>

    <section class="buttons">

        <div class="card">

            <h2>⚔️</h2>

            <p>Report Conflict</p>

        </div>

        <div class="card">

            <h2>💧</h2>

            <p>Report Water Shortage</p>

        </div>

        <div class="card">

            <h2>☀️</h2>

            <p>Report Drought</p>

        </div>

        <div class="card">

            <h2>🌧️</h2>

            <p>Rainfall Update</p>

        </div>

    </section>

    <section class="report">

        <h2>Submit a Report</h2>

        <form>

            <label>What happened?</label>

            <select>

                <option>
                    Conflict
                </option>

                <option>
                    Water Shortage
                </option>

                <option>
                    Drought
                </option>

                <option>
                    Rainfall Update
                </option>

            </select>

            <label>Your Location</label>

            <input type="text"
            placeholder="Village name">

            <label>Description</label>

            <textarea
            rows="5"
            placeholder="Briefly describe the situation">
            </textarea>

            <button type="submit">

                Submit

            </button>

        </form>

    </section>

</body>

</html>
